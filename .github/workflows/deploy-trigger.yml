name: Deploy Trigger.dev

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-trigger.yml"
      - "apps/trigger/**"
      - "packages/database/**"
      - "packages/lib/**"
      - "packages/services/**"
      - "packages/types/**"
      - "package.json"
      - "yarn.lock"
      - ".yarnrc.yml"

permissions:
  contents: read

concurrency:
  group: trigger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production tasks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: yarn db:generate

      - name: Deploy Trigger.dev
        working-directory: apps/trigger
        run: yarn dlx trigger.dev@latest deploy --env prod
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
